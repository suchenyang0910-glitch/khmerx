server:
  port: 8082

spring:
  application:
    name: risk-engine-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kx_aire}?currentSchema=risk_engine
    username: ${DB_USER:khmerx}
    password: ${DB_PASSWORD:khmerx}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB_RISK:1}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET_BASE64:YmFzZTY0RW5jb2RlZFNlY3JldEtleUZvckpXVERlbW9QdXJwb3NlT25seVBsZWFzZUNoYW5nZUl0}
  expiration: ${JWT_EXPIRATION_MS:86400000}
