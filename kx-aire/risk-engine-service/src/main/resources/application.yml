server:
  port: 8082

spring:
  application:
    name: risk-engine-service
  datasource:
    url: jdbc:postgresql://localhost:5432/risk_engine
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 1

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
